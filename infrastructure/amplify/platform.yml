version: 1
applications:
  - appRoot: apps/platform
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 24
            - nvm use 24
            - npm ci
        build:
          commands:
            - npm run build:platform
      artifacts:
        baseDirectory: apps/platform/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/platform/.next/cache/**/*
