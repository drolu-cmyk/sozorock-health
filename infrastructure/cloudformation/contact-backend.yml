AWSTemplateFormatVersion: '2010-09-09'
Description: Durable, least-privilege public contact and mobile non-clinical access intake for SozoRock Health.

Parameters:
  AmplifyAppId:
    Type: String
  AmplifyBranchName:
    Type: String
    Default: main
  ContactEmail:
    Type: String
    Default: contact@sozorockfoundation.org
  OpenAISecretArn:
    Type: String
    Description: ARN of the existing dedicated OpenAI Realtime Voice secret.

Resources:
  ContactSubmissions:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sozorock-health-contact-submissions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: submissionId
          AttributeType: S
      KeySchema:
        - AttributeName: submissionId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Product
          Value: SozoRockHealth
        - Key: DataClass
          Value: ContactInquiry

  AccessRequests:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sozorock-health-access-requests
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Product
          Value: SozoRockHealth
        - Key: DataClass
          Value: NonClinicalAccessRequest

  ContactNotifications:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sozorock-health-contact-notifications
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Product
          Value: SozoRockHealth

  ContactRateLimitSalt:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: sozorock-health/contact-rate-limit-salt
      Description: Random salt for one-way contact rate-limit identifiers.
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  AccessRateLimitSalt:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: sozorock-health/access-rate-limit-salt
      Description: Random salt for one-way mobile access request rate-limit identifiers.
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  ContactEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref ContactNotifications
      Protocol: email
      Endpoint: !Ref ContactEmail

  PublicSiteComputeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmplifySSRComputeRole-SozoRockHealthPublic
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ContactIntakeOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ContactSubmissions.Arn
                  - !GetAtt AccessRequests.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref ContactNotifications
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref OpenAISecretArn
                  - !Ref ContactRateLimitSalt
                  - !Ref AccessRateLimitSalt

Outputs:
  ContactTableName:
    Value: !Ref ContactSubmissions
  ContactTopicArn:
    Value: !Ref ContactNotifications
  ComputeRoleArn:
    Value: !GetAtt PublicSiteComputeRole.Arn
  RealtimeVoiceSecretArn:
    Value: !Ref OpenAISecretArn
  ContactRateLimitSaltSecretArn:
    Value: !Ref ContactRateLimitSalt
  AccessRequestTableName:
    Value: !Ref AccessRequests
  AccessRateLimitSaltSecretArn:
    Value: !Ref AccessRateLimitSalt
