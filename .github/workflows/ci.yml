name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Reject publicly served publication PDFs
        run: |
          if find apps/public-site/public/publications -type f -name '*.pdf' -print -quit | grep -q .; then
            echo "Publication PDFs must be delivered from the private publication bucket."
            exit 1
          fi
      - run: npm run build:public
      - run: npm run build:platform
      - run: npm exec --workspace @sozorock/mobile -- expo-doctor
      - run: npm exec --workspace @sozorock/mobile -- expo export --platform android --output-dir dist/ci-android
      - run: npm exec --workspace @sozorock/mobile -- expo export --platform ios --output-dir dist/ci-ios
      - run: npm audit --omit=dev --audit-level=moderate
