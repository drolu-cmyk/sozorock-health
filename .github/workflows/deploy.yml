name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options: [staging, production]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Deploy public site and CB-CAP
        env:
          PUBLIC_APP_ID: ${{ vars.PUBLIC_AMPLIFY_APP_ID }}
          CBCAP_APP_ID: ${{ vars.CBCAP_AMPLIFY_APP_ID }}
        run: |
          set -euo pipefail
          for app_id in "$PUBLIC_APP_ID" "$CBCAP_APP_ID"; do
            test -n "$app_id"
            job_id=$(aws amplify start-job --app-id "$app_id" --branch-name main --job-type RELEASE --query 'jobSummary.jobId' --output text)
            while true; do
              status=$(aws amplify get-job --app-id "$app_id" --branch-name main --job-id "$job_id" --query 'job.summary.status' --output text)
              case "$status" in
                SUCCEED) break ;;
                FAILED|CANCELLED) echo "Amplify job $job_id for $app_id ended with $status"; exit 1 ;;
                *) sleep 20 ;;
              esac
            done
          done
