name: Repair AI Lab AWS trust

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  repair:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Assume trusted SozoRock production role
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.CBCAP_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: ai-lab-trust-repair
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Repair and verify AI Lab deployment trust
        id: repair
        continue-on-error: true
        run: |
          set -o pipefail
          bash scripts/repair-ai-lab-aws-trust.sh 2>&1 | tee /tmp/ai-lab-trust-repair.log
      - name: Publish repair result
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.repair.outcome }}
        run: |
          log=$(tail -n 40 /tmp/ai-lab-trust-repair.log 2>/dev/null || true)
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "AI Lab AWS trust repair: ${OUTCOME}" \
            --body "Outcome: **${OUTCOME}**\n\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\n\n\`\`\`text\n${log}\n\`\`\`"
          test "$OUTCOME" = "success"
