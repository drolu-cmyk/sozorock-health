name: Repair AI Lab AWS trust

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  repair:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Assume trusted SozoRock production role
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ vars.CBCAP_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: ai-lab-trust-repair
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Repair and verify AI Lab deployment trust
        run: bash scripts/repair-ai-lab-aws-trust.sh
